name: Scrape, incremental build and deploy

on:
  schedule:
    # --- TEMPORADA ALTA (febrero a mayo / agosto a noviembre) ---
    
    # Lunes a jueves: Dos veces al día (15:09 y 21:09 UTC)
    - cron: '9 15,21 * 2,3,4,5,8,9,10,11 1-4'
    
    # Viernes, sábado y domingo: CADA 10 MINUTOS durante los partidos
    # (Desde las 08:00 UTC hasta las 21:50 UTC)
    # Esto cubre en tu reloj local aprox. de 10:00 a 23:50
    - cron: '*/10 8-21 * 2,3,4,5,8,9,10,11 0,5,6'

    # --- PERÍODOS DE DESCANSO (dic, ene, jun, jul) ---
    
    # Dos veces al día a las 09:09 y 21:09 UTC para mantener viva la caché
    - cron: '9 9,21 * 1,6,7,12 *'

  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # Obtener la versión de R como string para la caché
      - name: Get R version
        id: get-r-version
        run: echo "version=$(Rscript -e 'cat(R.version$major, R.version$minor, sep=\".\")')" >> $GITHUB_OUTPUT

      # Instalar dependencias de sistema
      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - name: R packages cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ steps.get-r-version.outputs.version }}-pacman-${{ hashFiles('scrape.R', 'buildhtml.R') }}
          restore-keys: ${{ runner.os }}-r-${{ steps.get-r-version.outputs.version }}-pacman-

      - name: Restore RDS from cache
        id: cache-rds
        uses: actions/cache/restore@v4
        with:
          path: |
            *.rds
          key: rds-cache-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            rds-cache-v2-${{ runner.os }}-

      - name: "Fallback: use workspace files, download from release, or restore from git history"
        if: steps.cache-rds.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 0th tier: .rds files already present from git checkout
          if ls *.rds >/dev/null 2>&1; then
            echo ".rds files already present in workspace — using them directly."
          # 1st tier: download from GitHub Release (fast, always has latest)
          elif gh release download actas-cache -p "rds-cache.tar.gz" --clobber 2>/dev/null; then
            tar xzf rds-cache.tar.gz
            rm rds-cache.tar.gz
            echo "Restored from release asset."
          # 2nd tier: restore .rds files from git history
          elif RDS_SOURCE=$(git log --diff-filter=D -- '*.rds' --format='%H~1' -1 2>/dev/null) && \
               git restore --source="$RDS_SOURCE" -- '*.rds' 2>/dev/null; then
            echo "Restored .rds files from git history ($RDS_SOURCE)."
          # 3rd tier: nothing available — scrape from scratch
          else
            echo "No release and no .rds in git history — will scrape from scratch."
          fi

      # Restore docs/ from cache (primary) or release (fallback)
      - name: Restore docs from cache
        id: cache-docs
        uses: actions/cache/restore@v4
        with:
          path: docs/
          key: docs-cache-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            docs-cache-v2-${{ runner.os }}-

      - name: "Fallback: download docs from release"
        if: steps.cache-docs.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf docs/
          if gh release download actas-cache -p "docs-cache.tar.gz" --clobber 2>/dev/null; then
            tar xzf docs-cache.tar.gz
            rm docs-cache.tar.gz
            echo "Docs restored from release."
          else
            echo "No docs cache found — will generate all pages."
          fi

      - name: Scrape
        run: Rscript scrape.R

      # Early exit: si no se scrapeó ningún acta nueva, paramos aquí
      - name: Check if changes detected
        id: check-changes
        run: |
          hubo=$(Rscript -e 'info <- readRDS("cache_info.rds"); cat(ifelse(info$hubo_cambios, "true", "false"))' 2>/dev/null || echo "true")
          echo "hubo_cambios=$hubo" >> $GITHUB_OUTPUT
          if [ "$hubo" = "true" ]; then
            echo "Cambios detectados. Continuando con build y deploy."
          else
            echo "Sin cambios. Saltando build, subida de docs, CDN y deploy."
          fi

      - name: Save RDS to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            *.rds
          key: rds-cache-v2-${{ runner.os }}-${{ github.run_id }}

      - name: Upload RDS to release (single rotating asset)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar czf rds-cache.tar.gz *.rds
          if gh release view actas-cache &>/dev/null; then
            gh release upload actas-cache rds-cache.tar.gz --clobber
          else
            gh release create actas-cache rds-cache.tar.gz --title "actas-cache" --notes "Auto-updated cache files"
          fi
          rm rds-cache.tar.gz

      - name: Build HTML (incremental)
        if: steps.check-changes.outputs.hubo_cambios == 'true'
        run: Rscript buildhtml.R

      - name: Save docs to cache
        if: steps.check-changes.outputs.hubo_cambios == 'true'
        uses: actions/cache/save@v4
        with:
          path: docs/
          key: docs-cache-v2-${{ runner.os }}-${{ github.run_id }}

      - name: Force-push search_data.json to CDN orphan branch
        if: steps.check-changes.outputs.hubo_cambios == 'true'
        run: |
          if [ ! -f search_data.json ]; then
            echo "search_data.json not found. Skipping CDN push."
            exit 0
          fi

          mkdir -p /tmp/cdn-push
          cp search_data.json /tmp/cdn-push/
          cd /tmp/cdn-push

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b data-cdn
          git add search_data.json
          git commit -m "CDN Data Update"

          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/MarcosMarinM/zfudbalmk.git
          git push origin data-cdn --force

          CDN_HASH=$(git ls-remote origin data-cdn | awk '{print $1}')
          echo "CDN_HASH=$CDN_HASH" >> $GITHUB_ENV
          echo "Pushed search_data.json to data-cdn branch (hash: $CDN_HASH)"

      - name: Inject CDN URL into script.js
        if: steps.check-changes.outputs.hubo_cambios == 'true'
        run: |
          if [ -n "${CDN_HASH}" ]; then
            CDN_URL="https://cdn.jsdelivr.net/gh/MarcosMarinM/zfudbalmk@${CDN_HASH}/search_data.json"
            echo "Injecting CDN URL: $CDN_URL"
            sed -i "s|__CDN_SEARCH_DATA_URL__|${CDN_URL}|g" docs/assets/script.js
            echo "CDN URL injected successfully."
          else
            echo "CDN_HASH not set. Keeping placeholder. Search data will not be available."
          fi

      - name: Deploy to Firebase Hosting
        if: steps.check-changes.outputs.hubo_cambios == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: zfudbalmk-mmm
